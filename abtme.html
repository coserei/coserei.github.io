
<!DOCTYPE HTML>
<html>
    <head>
        <title>Viva la vida</title>
        <link rel="stylesheet" href="style/main.dark.css" id="theme">
        <script>
            function darkMode() {
                const theme = document.querySelector("#theme");
                const dark = document.getElementById("dark")
                if(theme.getAttribute("href") == "style/main.dark.css") { 
                    theme.href = "style/main.light.css"
                    dark.innerHTML = "DARK MODE"
                } else {
                    theme.href = "style/main.dark.css"
                    dark.innerHTML = "LIGHT MODE"
                }
            }
        </script>
    </head>
    <body>
        <nav>
            <ul>
                <li><img src="img/viva_la_vida.png" width="350" class="vivalavida"><a></a></li>

                <li><a href="projects.html">PROJECTS</a></li>
                <li><a href="abtme.html">ABOUT ME</a></li>
            </ul>
        </nav>
        <p class="me">
            I'm Indy Tallen, a hobby photographer based in Haarlem. My gear consists of nothing fancy, but more than enough to shoot some nice pictures; a Canon EOS 350D paired with a Tamron 28-105mm f/4-5.6 lens.
        </p>
        <img src="img/ik.jpg" class="ik">
        <button class="dark" onclick="darkMode()"><p id="dark" class="darktext">LIGHT MODE</p></button>
    </body>
</html>
